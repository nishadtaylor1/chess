<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Register — Chess</title>
  <link rel="stylesheet" href="/css/auth.css">
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="piece">♟</div>
      <h1>Chess</h1>
      <p>Create your account</p>
    </div>

    <div class="error" id="error"></div>

    <form id="registerForm">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username"
               placeholder="Choose a username" required>
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" autocomplete="email"
               placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="new-password"
               placeholder="At least 8 characters" required>
      </div>
      <div class="form-group">
        <label for="skill_level">Your skill level</label>
        <select id="skill_level" name="skill_level" style="width:100%;padding:10px 14px;background:#0f172a;border:1px solid #334155;border-radius:6px;color:#f1f5f9;font-size:14px;cursor:pointer;outline:none;">
          <option value="beginner">Beginner — just learning the rules (600)</option>
          <option value="casual">Casual — know the basics, play for fun (900)</option>
          <option value="intermediate" selected>Intermediate — regular player, know some tactics (1200)</option>
          <option value="advanced">Advanced — competitive, study openings (1500)</option>
          <option value="expert">Expert — tournament-level player (1800)</option>
        </select>
        <p style="font-size:11px;color:#475569;margin-top:5px;">Don't worry — your ELO adjusts automatically after each game.</p>
      </div>
      <button type="submit" class="btn" id="submitBtn">Create Account</button>
    </form>

    <div class="footer-link">
      Already have an account? <a href="/login">Sign in</a>
    </div>
  </div>

  <script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const errEl = document.getElementById('error');
      errEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Creating account…';

      const res = await fetch('/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username:    document.getElementById('username').value,
          email:       document.getElementById('email').value,
          password:    document.getElementById('password').value,
          skill_level: document.getElementById('skill_level').value,
        }),
      });

      const data = await res.json();
      if (data.ok) {
        window.location.href = '/';
      } else {
        errEl.textContent = data.error;
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    });
  </script>
</body>
</html>
